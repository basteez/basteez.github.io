name: Cross-post to dev.to

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: devto-crosspost
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crosspost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crosspost/requirements.txt

      - name: Run cross-post script
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          python -m scripts.crosspost

      - name: Commit updated state file
        run: |
          if [[ -n "$(git status --porcelain .crosspost/state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .crosspost/state.json
            git commit -m "chore(crosspost): sync dev.to state"
            git push origin HEAD:main
          else
            echo "No state changes to commit."
          fi
